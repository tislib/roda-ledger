name: Deploy Demo

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: "Hetzner server name (also used as the SSH-key name). Use a different value to run multiple demos in parallel."
        required: false
        default: "roda-ledger-demo"
        type: string
      server_type:
        description: "Hetzner server type (e.g. cx22, cpx31, ccx33). If the type isn't available in fsn1, the run will fail and print the list of available types."
        required: false
        default: "CX33"
        type: string

env:
  IMAGE: tislib/roda-ledger
  CONTROL_IMAGE: tislib/roda-ledger:control-demo-${{ github.run_id }}
  UI_IMAGE: tislib/roda-ledger:ui-demo-${{ github.run_id }}
  HETZNER_IMAGE: ubuntu-24.04
  HETZNER_LOCATION: fsn1

jobs:
  build-images:
    name: Build & Push (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - variant: control
            dockerfile: control.Dockerfile
            tag_prefix: "control-"
          - variant: ui
            dockerfile: ui/Dockerfile
            tag_prefix: "ui-"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ matrix.tag_prefix }}demo-${{ github.run_id }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  deploy:
    name: Deploy to Hetzner
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hcloud CLI
        run: scripts/util/hcloud-install.sh

      # Provision the server and bring up the stack. CONTROL_IMAGE/UI_IMAGE come from
      # the workflow env above; deploy-demo.sh reads them and writes results/demo-info.env.
      - name: Provision server & deploy demo stack
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_NAME: ${{ inputs.server_name }}
          SERVER_TYPE: ${{ inputs.server_type }}
          SERVER_IMAGE: ${{ env.HETZNER_IMAGE }}
          SERVER_LOCATION: ${{ env.HETZNER_LOCATION }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: scripts/deploy/deploy-demo.sh

      - name: Write demo info to step summary
        run: |
          set -a
          # shellcheck source=/dev/null
          . results/demo-info.env
          set +a
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Roda-Ledger Demo Deployed

          | | |
          |---|---|
          | Server name | \`$SERVER_NAME\` |
          | Server type | \`$SERVER_TYPE\` |
          | Public IP | \`$SERVER_IP\` |
          | Demo URL | http://$SERVER_IP:8080 |
          | gRPC endpoint | \`$SERVER_IP:50051\` |
          | Control image | \`$CONTROL_IMAGE\` |
          | UI image | \`$UI_IMAGE\` |

          The server is **persistent** — it will not be auto-destroyed.

          To destroy it manually:
          \`\`\`bash
          hcloud server delete $SERVER_NAME
          hcloud ssh-key delete $SERVER_NAME
          \`\`\`
          EOF
