name: Docker Publish

on:
  push:
    branches: [master]
    tags: ["v*"]

env:
  IMAGE: tislib/roda-ledger

jobs:
  docker:
    name: Build & Push (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cluster
            dockerfile: Dockerfile
            tag_prefix: ""
          - variant: ui
            dockerfile: ui/Dockerfile
            tag_prefix: "ui-"
          - variant: control
            dockerfile: control.Dockerfile
            tag_prefix: "control-"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ matrix.tag_prefix }}latest,enable={{is_default_branch}}
            type=sha,prefix=${{ matrix.tag_prefix }}sha-,format=short
            type=semver,pattern=${{ matrix.tag_prefix }}{{version}}
            type=semver,pattern=${{ matrix.tag_prefix }}{{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
