name: E2E Test

on:
  workflow_dispatch:
    inputs:
      nodes:
        description: "Nodes per scenario cluster (default 3; needs ≥3 for failover scenarios)"
        required: false
        default: "3"

env:
  HETZNER_SERVER_NAME: "e2e-test-${{ github.run_id }}"
  HETZNER_SERVER_TYPE: ccx23
  HETZNER_IMAGE: ubuntu-24.04
  HETZNER_LOCATION: fsn1

jobs:
  e2e-test:
    name: Run E2E Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hcloud CLI
        run: scripts/util/hcloud-install.sh

      # Provisions a server, runs the e2e suite on it, fetches results/, then destroys
      # the server (the orchestrator traps EXIT). The always-destroy step below is a
      # backstop in case the orchestrator is killed before its trap runs.
      - name: Run E2E test on Hetzner
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_NAME: ${{ env.HETZNER_SERVER_NAME }}
          SERVER_TYPE: ${{ env.HETZNER_SERVER_TYPE }}
          SERVER_IMAGE: ${{ env.HETZNER_IMAGE }}
          SERVER_LOCATION: ${{ env.HETZNER_LOCATION }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          NODES: ${{ inputs.nodes }}
        run: scripts/deploy/e2e-test.sh

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ github.run_id }}
          path: results/
          retention-days: 90

      - name: Destroy Hetzner server
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_NAME: ${{ env.HETZNER_SERVER_NAME }}
        run: scripts/util/destroy-server.sh --name "$SERVER_NAME"
