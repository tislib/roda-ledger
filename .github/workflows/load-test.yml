name: Load Test

on:
  workflow_dispatch:
    inputs:
      args:
        description: "Optional arguments passed to the load binary (e.g. --accounts 1000000 --mode async)"
        required: false
        default: ""

env:
  HETZNER_SERVER_NAME: "load-test-${{ github.run_id }}"
  HETZNER_SERVER_TYPE: ccx33
  HETZNER_IMAGE: ubuntu-24.04
  HETZNER_LOCATION: fsn1

jobs:
  load-test:
    name: Run Load Test
    runs-on: ubuntu-latest
    steps:
      - name: Install hcloud CLI
        run: |
          curl -sL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar xz
          sudo mv hcloud /usr/local/bin/

      - name: Create SSH key pair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/load_test_key -N "" -q
          echo "SSH_PUBLIC_KEY=$(cat ~/.ssh/load_test_key.pub)" >> $GITHUB_ENV

      - name: Upload SSH key to Hetzner
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          KEY_RESPONSE=$(hcloud ssh-key create \
            --name "load-test-${{ github.run_id }}" \
            --public-key "$SSH_PUBLIC_KEY" \
            --output json)
          echo "SSH_KEY_ID=$(echo "$KEY_RESPONSE" | jq -r '.id // .ssh_key.id')" >> $GITHUB_ENV

      - name: Create Hetzner server
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          SERVER_RESPONSE=$(hcloud server create \
            --name "$HETZNER_SERVER_NAME" \
            --type "$HETZNER_SERVER_TYPE" \
            --image "$HETZNER_IMAGE" \
            --location "$HETZNER_LOCATION" \
            --ssh-key "load-test-${{ github.run_id }}" \
            --output json)
          SERVER_IP=$(echo "$SERVER_RESPONSE" | jq -r '.server.public_net.ipv4.ip')
          echo "SERVER_IP=$SERVER_IP" >> $GITHUB_ENV
          echo "Server created at $SERVER_IP"

      - name: Wait for server to be reachable
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i ~/.ssh/load_test_key root@$SERVER_IP "echo ok" 2>/dev/null; then
              echo "Server is reachable"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 10
          done
          echo "::error::Server not reachable after 5 minutes"
          exit 1

      - name: Setup server and run load test
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/load_test_key root@$SERVER_IP \
            "BRANCH='$BRANCH' REPO='$REPO' ARGS='$ARGS' bash -s" << 'SETUP_EOF'
          set -euo pipefail

          # Install dependencies
          apt-get update -qq
          apt-get install -y -qq build-essential pkg-config libssl-dev git curl protobuf-compiler

          # Install Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y -q

          # Clone repository
          git clone --branch "$BRANCH" --depth 1 "https://github.com/$REPO.git" /root/roda-ledger
          cd /root/roda-ledger

          # Build the load binaries once, then run each directly so the captured
          # output is clean (no cargo build noise leaks into the report).
          echo "::group::Build"
          /root/.cargo/bin/cargo build --package ledger --release \
            --bin load --bin load_latency --bin load_wasm
          echo "::endgroup::"

          BIN=/root/roda-ledger/target/release

          # 1) Throughput — built-in deposit
          echo "::group::Throughput (load)"
          "$BIN/load" | tee /root/out-load.txt
          echo "::endgroup::"

          # 2) End-to-end latency under load, one run per wait level
          for lvl in compute write commit snapshot; do
            echo "::group::Latency — wait-level=$lvl"
            "$BIN/load_latency" --wait-level "$lvl" | tee "/root/out-latency-$lvl.txt"
            echo "::endgroup::"
          done

          # 3) WASM deposit throughput — same deposit via Operation::Function
          echo "::group::WASM deposit throughput (load_wasm)"
          "$BIN/load_wasm" | tee /root/out-wasm.txt
          echo "::endgroup::"

          # 4) Assemble a docs/load.md-shaped report from the captured output
          echo "::group::Assemble load.md"
          {
            echo "# Load Test Report"
            echo
            echo "Generated by the **Load Test** workflow on a CCX33 server (Hetzner, 8 dedicated vCPU), 1,000,000 accounts, deposit operations, release build with WAL persistence enabled."
            echo
            echo "- **Throughput** — sustained tx/s with submit-side latency (\`load\`)."
            echo "- **Latency under load** — end-to-end latency to each pipeline stage (\`load_latency --wait-level\`)."
            echo "- **WASM deposit throughput** — the same deposit driven through a registered WASM function (\`load_wasm\`)."
            echo
            echo "## Throughput"
            echo
            echo '```text'
            cat /root/out-load.txt
            echo '```'
            echo
            echo "## Latency Under Load"
            echo
            echo "Each probe submits one deposit and times it until the selected pipeline index reaches it, repeated 1000x per scenario across five load levels. \`--wait-level\` picks the stage:"
            echo
            echo "| Level | Stage |"
            echo "|---|---|"
            echo "| compute | executed by the transactor (in-memory) |"
            echo "| write | written to the WAL page cache (buffered, pre-fsync) |"
            echo "| commit | fdatasync'd to disk — durable |"
            echo "| snapshot | applied to the snapshot/indexer — readable |"
            for lvl in compute write commit snapshot; do
              echo
              echo "### wait-level: $lvl"
              echo
              echo '```text'
              cat "/root/out-latency-$lvl.txt"
              echo '```'
            done
            echo
            echo "## WASM Deposit Throughput"
            echo
            echo "The deposit executed as a registered WASM \`Operation::Function\` instead of the built-in op; the gap vs Throughput above is the WASM invocation cost."
            echo
            echo '```text'
            cat /root/out-wasm.txt
            echo '```'
          } > /root/load.md
          echo "::endgroup::"
          SETUP_EOF
        env:
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          ARGS: ${{ inputs.args }}

      - name: Retrieve results
        if: always()
        run: |
          mkdir -p results
          # The assembled report (drop-in for docs/load.md) ...
          scp -o StrictHostKeyChecking=no -i ~/.ssh/load_test_key \
            root@$SERVER_IP:/root/load.md results/load.md 2>/dev/null || \
            echo "No load.md to retrieve" > results/load.md
          # ... plus every raw per-run capture for debugging.
          scp -o StrictHostKeyChecking=no -i ~/.ssh/load_test_key \
            "root@$SERVER_IP:/root/out-*.txt" results/ 2>/dev/null || \
            echo "No raw output files to retrieve"
      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ github.run_id }}
          path: results/
          retention-days: 90

      - name: Destroy Hetzner server
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          echo "Destroying server $HETZNER_SERVER_NAME..."
          hcloud server delete "$HETZNER_SERVER_NAME" || true
          echo "Cleaning up SSH key..."
          hcloud ssh-key delete "load-test-${{ github.run_id }}" || true
          echo "Cleanup complete"
