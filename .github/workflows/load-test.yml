name: Load Test

on:
  workflow_dispatch:
    inputs:
      args:
        description: "Optional arguments passed to the load binary (e.g. --accounts 1000000 --mode async)"
        required: false
        default: ""

env:
  HETZNER_SERVER_NAME: "load-test-${{ github.run_id }}"
  HETZNER_SERVER_TYPE: ccx33
  HETZNER_IMAGE: ubuntu-24.04
  HETZNER_LOCATION: fsn1

jobs:
  load-test:
    name: Run Load Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hcloud CLI
        run: scripts/util/hcloud-install.sh

      # Provisions a server, runs the load probes + assembles load.md on it, fetches
      # results/, then destroys the server (the orchestrator traps EXIT). The
      # always-destroy step below is a backstop if the orchestrator is killed first.
      - name: Run load test on Hetzner
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_NAME: ${{ env.HETZNER_SERVER_NAME }}
          SERVER_TYPE: ${{ env.HETZNER_SERVER_TYPE }}
          SERVER_IMAGE: ${{ env.HETZNER_IMAGE }}
          SERVER_LOCATION: ${{ env.HETZNER_LOCATION }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ARGS: ${{ inputs.args }}
        run: scripts/deploy/load-test.sh

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ github.run_id }}
          path: results/
          retention-days: 90

      - name: Destroy Hetzner server
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_NAME: ${{ env.HETZNER_SERVER_NAME }}
        run: scripts/util/destroy-server.sh --name "$SERVER_NAME"
