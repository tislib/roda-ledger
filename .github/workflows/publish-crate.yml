name: Publish roda-wasm-abi

# Dedicated tag prefix so publishing the guest crate is decoupled from the
# `v*` docker/docs releases. Bump the crate's version before tagging.
#   git tag roda-wasm-abi-v0.1.0 && git push origin roda-wasm-abi-v0.1.0
# Requires a CARGO_REGISTRY_TOKEN secret (a crates.io API token).
on:
  push:
    tags: ["roda-wasm-abi-v*"]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  publish:
    name: Build, test & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"

      - name: Build, test & publish
        run: scripts/ci/publish-wasm-abi.sh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
