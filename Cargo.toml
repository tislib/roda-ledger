[package]
name = "roda-ledger"
version = "0.1.0"
edition = "2024"
description = "A zero-copy, lock-free multi-threaded stage engine for ultra-low latency pipelines."
authors = ["Taleh Ibrahimli"]
repository = "https://github.com/tislib/roda-ledger"
license = "Apache-2.0"
keywords = ["lock-free", "ledger", "concurrency", "pipeline", "low-latency"]
categories = ["concurrency", "data-structures", "ledger"]

[dependencies]
crossbeam-queue = "0.3.12"
crossbeam-skiplist = "0.1"
bytemuck = { version = "1.21.0", features = ["derive"] }
arc-swap = "1"
tokio = { version = "1.43.0", features = ["full"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name = "wallet_deposit_bench"
harness = false

[[bench]]
name = "wallet_bench"
harness = false

[[bench]]
name = "wal_bench"
harness = false

[[bench]]
name = "transactor_bench"
harness = false

[[bench]]
name = "wallet_server_bench"
harness = false
