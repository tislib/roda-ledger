syntax = "proto3";

package roda.ledger.v1;

// All monetary amounts are integer minor units (e.g. cents); no floating point.
// All RPCs are unary — batching means grouping operations or IDs in one request.
service Ledger {

  // Fire-and-forget: returns once the operation is sequenced, before it is
  // executed, persisted, or snapshotted. Poll status for finality.
  rpc SubmitOperation(SubmitOperationRequest) returns (SubmitOperationResponse);

  // SubmitAndWait blocks until the operation reaches the requested WaitLevel.
  rpc SubmitAndWait(SubmitAndWaitRequest) returns (SubmitAndWaitResponse);
  // SubmitAndWaitResult always waits for the SNAPSHOT stage, then returns the
  // committed transaction read back from the snapshot.
  rpc SubmitAndWaitResult(SubmitAndWaitResultRequest) returns (SubmitAndWaitResultResponse);

  // The whole batch is sequenced and executed as one contiguous, in-order block;
  // no other client's transactions interleave. Not atomic as a whole — a crash
  // mid-batch keeps already-committed operations; each operation is itself atomic.
  rpc SubmitBatch(SubmitBatchRequest) returns (SubmitBatchResponse);

  // SubmitBatchAndWait blocks until every operation reaches the requested WaitLevel.
  rpc SubmitBatchAndWait(SubmitBatchAndWaitRequest) returns (SubmitBatchAndWaitResponse);
  // SubmitBatchAndWaitResult waits for every operation to reach the SNAPSHOT stage,
  // then returns the committed transactions read back from the snapshot.
  rpc SubmitBatchAndWaitResult(SubmitBatchAndWaitResultRequest) returns (SubmitBatchAndWaitResultResponse);

  // Reflects only ON_SNAPSHOT transactions, so it may lag committed writes.
  // For a read-your-write, poll until last_snapshot_tx_id >= your transaction_id.
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);

  // Like GetBalance but for many accounts; the same snapshot-lag caveat applies.
  rpc GetBalances(GetBalancesRequest) returns (GetBalancesResponse);

  rpc GetTransactionStatus(GetStatusRequest) returns (GetStatusResponse);

  rpc GetTransactionStatuses(GetStatusesRequest) returns (GetStatusesResponse);

  rpc GetPipelineIndex(GetPipelineIndexRequest) returns (GetPipelineIndexResponse);

  // Looks up the in-memory index first (hot), falls back to sealed segments (cold).
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse);

  // Transactions for an account, newest-first and paginated; hot index then sealed segments.
  rpc GetAccountHistory(GetAccountHistoryRequest) returns (GetAccountHistoryResponse);

  // Blocks until the transaction reaches the WaitLevel, or the outcome is known
  // (not found / term mismatch).
  rpc WaitForTransaction(WaitForTransactionRequest) returns (WaitForTransactionResponse);

  // ---- WASM function registry ----

  // Blocks until the record is snapshotted and the runtime reflects the new
  // handler, so subsequent Function operations referencing `name` see it.
  rpc RegisterFunction(RegisterFunctionRequest) returns (RegisterFunctionResponse);

  // Blocks until the handler is gone; later Function operations on `name` return INVALID_OPERATION.
  rpc UnregisterFunction(UnregisterFunctionRequest) returns (UnregisterFunctionResponse);

  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsResponse);

  // Reads raw WAL records over [from_tx_id, to_tx_id] from this node's local WAL; paginate via next_tx_id.
  rpc GetLog(GetLogRequest) returns (GetLogResponse);

  // Returns this node's Raft term boundaries (term.log) and vote decisions (vote.log);
  // a term may appear in only one log — see has_term_record / has_vote_record.
  rpc GetTerms(GetTermsRequest) returns (GetTermsResponse);
}

// ---- Operation messages ----

// Exactly one operation must be set; setting none or more than one is an error.
message SubmitOperationRequest {
  oneof operation {
    Deposit     deposit = 1;
    Withdrawal  withdrawal = 2;
    Transfer    transfer = 3;
    OpenAccount open_account = 4;
    Function    function = 5;
  }
}

message SubmitAndWaitRequest {
  oneof operation {
    Deposit     deposit = 1;
    Withdrawal  withdrawal = 2;
    Transfer    transfer = 3;
    OpenAccount open_account = 4;
    Function    function = 5;
  }
  WaitLevel wait_level = 6;
}

message SubmitAndWaitResultRequest {
  oneof operation {
    Deposit     deposit = 1;
    Withdrawal  withdrawal = 2;
    Transfer    transfer = 3;
    OpenAccount open_account = 4;
    Function    function = 5;
  }
  // When true the server waits for CLUSTER_COMMIT (quorum-durable) before
  // reading the result back; otherwise it waits for the SNAPSHOT stage.
  // CLUSTER_COMMIT implies SNAPSHOT, so the committed transaction is always
  // available once the wait returns.
  bool cluster_wait = 6;
}

enum WaitLevel {
  WAIT_LEVEL_COMPUTED = 0; // Zero value, used by async SubmitOperation when omitted.
  WAIT_LEVEL_COMMITTED = 1;
  WAIT_LEVEL_SNAPSHOT = 2;
  WAIT_LEVEL_CLUSTER_COMMIT = 3;
}

// Deposit credits an account; the system source absorbs the debit to keep the
// ledger zero-sum. Never fails for insufficient funds.
message Deposit {
  uint64 account = 1; // Target account. Must be < max_accounts.
  uint64 amount = 2; // Minor units. Must be > 0.
  uint64 user_ref = 3; // Opaque external reference, stored in the WAL (e.g. your order/payment ID).
}

// Opens `count` sequential accounts. The first id is returned in the transaction's
// AccountOpened record (read it via GetTransaction).
message OpenAccount {
  uint32 count = 1; // Number of accounts to open. 0 is treated as 1.
  uint64 user_ref = 2; // Opaque external reference, stored in the WAL.
}

// Withdrawal debits an account; the system sink absorbs the credit to keep the
// ledger zero-sum. Fails with INSUFFICIENT_FUNDS if balance < amount.
message Withdrawal {
  uint64 account = 1; // Source account. Must be < max_accounts.
  uint64 amount = 2; // Minor units. Must be > 0.
  uint64 user_ref = 3; // See Deposit.user_ref.
}

// Transfer moves funds between two accounts atomically. Fails with INSUFFICIENT_FUNDS
// if the source balance < amount. If from == to it is a no-op and succeeds.
message Transfer {
  uint64 from = 1; // Source account. Must be < max_accounts.
  uint64 to = 2; // Destination account. Must be < max_accounts.
  uint64 amount = 3; // Minor units. Must be > 0.
  uint64 user_ref = 4; // See Deposit.user_ref.
}

// Function invokes a registered WASM function. The ABI is fixed at 8 `i64` params;
// proto3 lacks fixed arrays, so the server zero-pads short `params` and drops any beyond 8.
message Function {
  string         name = 1; // snake_case, max 32 bytes.
  repeated int64 params = 2; // 0..=8 positional parameters; short lists are zero-padded.
  uint64         user_ref = 3; // See Deposit.user_ref.
}

// ---- Submit responses ----

// transaction_id is assigned at sequencing — before execution, persistence, or snapshot.
message SubmitOperationResponse {
  uint64 transaction_id = 1; // Monotonically increasing, globally ordered.
  uint64 term = 2; // Leader term at reply time. 0 in single-node mode.
}

message SubmitAndWaitResponse {
  uint64   transaction_id = 1; // Monotonically increasing, globally ordered.
  uint64   term = 3; // Leader term at reply time. 0 in single-node mode.
}

message SubmitAndWaitResultResponse {
  CommitedTransaction transaction = 1;
  uint64   term = 2; // Leader term at reply time. 0 in single-node mode.
}

message SubmitBatchRequest {
  repeated SubmitOperationRequest operations = 1; // Executed in this order, contiguously.
}

message SubmitBatchResponse {
  repeated SubmitOperationResponse results = 1; // One per input operation, same order.
  uint64 term = 2; // Leader term at reply time. 0 in single-node mode.
}

message SubmitBatchAndWaitRequest {
  repeated SubmitAndWaitRequest operations = 1; // In order.
  WaitLevel                     wait_level = 2; // Stage to wait for.
}

message SubmitBatchAndWaitResultRequest {
  message Operation {
    oneof operation {
      Deposit     deposit = 1;
      Withdrawal  withdrawal = 2;
      Transfer    transfer = 3;
      OpenAccount open_account = 4;
      Function    function = 5;
    }
  }
  repeated Operation operations = 1; // In order.
  // See SubmitAndWaitResultRequest.cluster_wait.
  bool cluster_wait = 2;
}

message SubmitBatchAndWaitResponse {
  repeated SubmitAndWaitResponse results = 1; // One per input operation, same order.
  uint64 term = 2; // Leader term at reply time. 0 in single-node mode.
}

message SubmitBatchAndWaitResultResponse {
  repeated CommitedTransaction transactions = 1; // One per input operation, same order.
  uint64 term = 2; // Leader term at reply time. 0 in single-node mode.
}

// ---- Balance messages ----

message GetBalanceRequest {
  uint64 account_id = 1; // Returns 0 if the account was never touched.
  bool include_linked = 2; // Also return per-type linked-bucket balances.
}

message GetBalanceResponse {
  int64 balance = 1; // Minor units; may be negative for liability/system accounts. Reflects only ON_SNAPSHOT tx.
  uint64 last_snapshot_tx_id = 2; // All tx up to and including this ID are reflected; the true snapshot ID may be higher.
  repeated LinkedBalance linked = 3; // Per-type linked-bucket balances (only if requested).
  uint64 flags = 4; // The account's 8-lane flags word (lane 0 = status).
}

// A linked bucket's balance, keyed by its program-defined type_id.
message LinkedBalance {
  uint32 type_id = 1;
  int64 balance = 2;
}

message GetBalancesRequest {
  repeated uint64 account_ids = 1; // Duplicates allowed.
}

message GetBalancesResponse {
  repeated int64 balances = 1; // One per input account_id, same order; 0 if never touched.
  uint64 last_snapshot_tx_id = 2; // All tx up to and including this ID are reflected.
}

// ---- Status messages ----

message GetStatusRequest {
  uint64 transaction_id = 1;
  uint64 term = 2; // Optional fencing term. 0 = do not check.
}

message GetStatusResponse {
  TransactionStatus status = 1;
  bool              term_mismatch = 3; // Set when the request term mismatched; status is then unset.
  uint64            term = 4; // The superseding term.
  uint64            term_start_tx_id = 5; // First tx_id of the superseding term.
}

message GetStatusesRequest {
  repeated uint64 transaction_ids = 1;
}

message GetStatusesResponse {
  repeated GetStatusResponse results = 1; // One per input transaction_id, same order.
}

// Pipeline stages, strictly ordered: PENDING → COMPUTED → COMMITTED → ON_SNAPSHOT.
// ERROR is terminal, reachable only from PENDING.
enum TransactionStatus {
  // Sequenced only; business logic has not run and the balance is unchanged. Not durable.
  PENDING = 0;

  // Business logic executed; the balance change is in memory but not yet in WAL — a crash loses it.
  COMPUTED = 1;

  // Flushed to WAL: durable and replayed on restart. GetBalance still does not reflect it.
  COMMITTED = 2;

  // Applied to the balance cache; GetBalance now reflects it. Final successful state.
  ON_SNAPSHOT = 3;

  // Rejected by a constraint (e.g. insufficient funds). A WAL record is written for
  // audit and no balance change occurs. Check fail_reason for the cause.
  ERROR = 4;

  // tx_id was never sequenced here, or the supplied term does not cover it (then
  // term/term_start_tx_id identify the covering term). The TX_ prefix avoids a
  // proto3 enum-sibling collision with WaitOutcome::NOT_FOUND.
  TX_NOT_FOUND = 5;
}

// ---- Pipeline index ----

message GetPipelineIndexRequest {}

// Highest transaction_id fully processed by each pipeline stage.
message GetPipelineIndexResponse {
  uint64 compute_index = 1; // Executed by the Transactor (in memory, not durable). Ledger::last_compute_id().
  uint64 commit_index = 2; // Flushed to WAL (durable, crash-safe). Ledger::last_commit_id().
  uint64 snapshot_index = 3; // Applied to the balance cache; GetBalance reflects up to here. Ledger::last_snapshot_id().
  uint64 term = 4; // Current term.
  // Highest tx known quorum-committed. Leader: Quorum::get(). Follower: leader's
  // advertised watermark clamped to last_commit_id. 0 in single-node mode.
  uint64 cluster_commit_index = 5;
  bool is_leader = 6; // True iff this node is the current leader. Always true in single-node mode.
}

// ---- Transaction query ----

message GetTransactionRequest {
  uint64 tx_id = 1;
}

message GetTransactionResponse {
  CommitedTransaction transaction = 1;
}

message CommitedTransaction {
  WalEntry meta = 1;
  repeated WalEntry items = 2;
}

enum EntryKind {
  CREDIT = 0;
  DEBIT = 1;
}

enum LinkKind {
  DUPLICATE = 0;  // This transaction is a duplicate of to_tx_id.
  REVERSAL = 1;  // This transaction reverses to_tx_id.
}

message WaitForTransactionRequest {
  uint64    transaction_id = 1;
  uint64    term = 2; // Expected term. 0 = do not check.
  WaitLevel wait_level = 3;
}

message WaitForTransactionResponse {
  WaitOutcome outcome = 1;
  uint64      term = 2; // Superseding term. Only set on TERM_MISMATCH.
  uint64      term_start_tx_id = 3; // First tx_id of the superseding term; tx between it and yours are lost.
}

enum WaitOutcome {
  REACHED = 0; // Reached the requested WaitLevel.
  NOT_FOUND = 1; // Unknown transaction_id — too old, never existed, or compacted.
  TERM_MISMATCH = 2; // Term changed before commit; the transaction is lost (see term/term_start_tx_id).
}

// ---- Account history query ----

message GetAccountHistoryRequest {
  uint64 account_id = 1;
  uint64 from_tx_id = 2;  // 0 = latest; the backward scan starts here (newest→oldest).
  uint64 to_tx_id = 3;  // Oldest tx_id to include; the scan stops below it (0 = to the WAL start).
}

message GetAccountHistoryResponse {
  repeated CommitedTransaction transactions = 1;
  uint64 scan_last_tx_id = 2; // Oldest tx_id reached; send back as from_tx_id to page further into the past.
}

// ---- Function registry ----

message RegisterFunctionRequest {
  string name = 1;   // snake_case, max 32 bytes
  bytes  binary = 2;   // WASM binary; must export execute(i64 x 8) -> i32
  bool   override_existing = 3;   // if false and name already registered, server returns ALREADY_EXISTS
}

message RegisterFunctionResponse {
  uint32 version = 1;  // monotonic per-name, starts at 1
  uint32 crc32c = 2;  // CRC32C of the binary
}

message UnregisterFunctionRequest {
  string name = 1;
}

message UnregisterFunctionResponse {
  uint32 version = 1;  // version stamped on the unregister record
}

message ListFunctionsRequest {}

message ListFunctionsResponse {
  repeated FunctionInfo functions = 1;
}

message FunctionInfo {
  string name = 1;
  uint32 version = 2;
  uint32 crc32c = 3;
}

// ---- WAL log query ----

message GetLogRequest {
  uint64 from_tx_id = 1; // 0 = include structural records from start.
  uint64 to_tx_id = 2;   // 0 = unbounded; still capped by limit.
  uint32 limit = 3;      // default 1000, server hard-cap 10000.
}

message GetLogResponse {
  repeated WalEntry records = 1;
  uint64 next_tx_id = 2;        // 0 = no more records in [from..to] on this node.
  uint64 last_commit_tx_id = 3; // node's last_commit_id at read time.
}

// Mirrors the in-memory storage::entities::WalEntry enum.
// Field numbers 6 and 7 are retired (formerly WalSegmentHeader / WalSegmentSealed) — do not reuse.
message WalEntry {
  oneof entry {
    WalTxMetadata         metadata = 1;
    WalTxEntry            tx_entry = 2;
    WalTxLink             link = 3;
    WalTxTerm             term = 4;
    WalFunctionRegistered function_registered = 5;
    WalAccountOpened      account_opened = 8;
    WalAccountLinked      account_linked = 9;
    WalAccountFlagsUpdated account_flags_updated = 10;
  }
}

message WalTxMetadata {
  uint64 tx_id = 1;
  uint32 fail_reason = 2;
  uint32 sub_item_count = 3;
  uint32 crc32c = 4;
  uint64 timestamp = 5;
  uint64 user_ref = 6;
  string tag = 7; // Trailing-null-trimmed UTF-8 when valid, else 16-char lowercase hex.
}

message WalTxEntry {
  uint64 tx_id = 1;
  uint64 account_id = 2;
  uint64 amount = 3;
  EntryKind kind = 4;
  int64 computed_balance = 5;
}

message WalTxLink {
  uint64 tx_id = 1;
  uint64 to_tx_id = 2;
  LinkKind kind = 3;
}

message WalTxTerm {
  uint64 term = 1;
  uint64 node_id = 2;
  uint32 node_count = 3;
  uint32 node_voted = 4;
}

message WalFunctionRegistered {
  string name = 1;
  uint32 version = 2;
  uint32 crc32c = 3; // 0 = unregister record
}

message WalAccountOpened {
  uint64 begin_account_id = 1;
  uint32 count = 2;
  uint64 flags = 3;
  uint64 user_ref = 4;
}

message WalAccountLinked {
  uint64 parent_id = 1;
  uint32 type_id = 2;
  uint64 child_id = 3;
}

message WalAccountFlagsUpdated {
  uint64 account_id = 1;
  uint64 prev_flags = 2;
  uint64 new_flags = 3;
}

// ---- Terms / election history query ----

message GetTermsRequest {
  uint64 from_term = 1; // 0 = include from earliest term.
  uint32 limit = 2; // default 1000, server hard-cap 10000.
}

message GetTermsResponse {
  repeated TermInfo terms = 1; // Ascending by term.
  uint64   current_term = 2; // Current term at read time.
  uint64   next_term = 3; // 0 = no more; else first term not returned.
}

message TermInfo {
  uint64 term = 1;
  uint64 start_tx_id = 2; // 0 if no boundary committed (vote-only term).
  uint64 voted_for = 3; // This node's vote in this term; 0 = none granted.
  bool   has_term_record = 4; // true if term.log has a boundary for this term.
  bool   has_vote_record = 5; // true if vote.log has an entry for this term.
}
