syntax = "proto3";

// Peer-to-peer replication service (separate port from client API).
package roda.node.v1;

service Node {
  // Peer health check.
  rpc Ping(PingRequest) returns (PingResponse);

  // Leader election
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);

  // Snapshot catch-up
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);

  // Replication (process for AppendEntries), this is for continuously send AppendEntries for same Handshake setup, if the term changed, new handshake will happen
  rpc Replication(stream ReplicationLeaderMessage) returns(stream ReplicationFollowerMessage);
}

// ---- Ping ----

message PingRequest {
  uint64 from_node_id = 1;
  // Echoed back for RTT measurement without requiring clock sync.
  uint64 nonce = 2;
}

message PingResponse {
  uint64   node_id = 1;
  uint64   term = 2;
  uint64   last_tx_id = 3;
  NodeRole role = 4;
  uint64   nonce = 5;
}

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_LEADER = 1;
  NODE_ROLE_FOLLOWER = 2;
  NODE_ROLE_RECOVERING = 3;  // local recovery in progress, not serving
}

// ---- RequestVote (placeholder, UNIMPLEMENTED until ADR-016) ----

message RequestVoteRequest {
  uint64 term = 1;
  uint64 candidate_id = 2;
  uint64 last_tx_id = 3;
  uint64 last_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool   vote_granted = 2;
}

// ---- InstallSnapshot (placeholder, UNIMPLEMENTED until ADR-016) ----

message InstallSnapshotRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 last_included_tx_id = 3;
  uint64 last_included_term = 4;
  uint64 offset = 5;
  bytes  data = 6;
  bool   done = 7;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}

message ReplicationLeaderMessage {
  oneof message {
    ReplicationLeaderMessageHandshake handshake = 1;
    ReplicationLeaderMessageWalUpdate wal_update = 2;
    ReplicationLeaderMessageHeartBeat heartbeat = 3;
  }
}

message ReplicationLeaderMessageWalUpdate {
  bytes wal_binary = 1;
//  uint32 wal_binary_crc32 = 2;
  uint64 cluster_commit_id = 4;
}

message ReplicationLeaderMessageHeartBeat {
  uint64 cluster_commit_id = 4;
}

message ReplicationLeaderMessageHandshake {
  // Authority
  uint64 leader_id = 1;
  uint64 leader_term = 2;

  // First tx_id of leader's current term — fed to follower's
  // observe_term at handshake. 0 if no entries committed in this term yet.
  uint64 leader_term_first_tx_id = 3;

  // §5.3 Log Matching anchor.
  // Leader sets prev_log_tx_id = local_commit_index,
  //            prev_log_term  = term_at_tx(local_commit_index).
  uint64 prev_log_tx_id = 4;
  uint64 prev_log_term = 5;

  // Leader's cluster_commit_index; follower mirrors it via
  // advance_cluster_index (clamped to its own local_commit_index).
  uint64 leader_commit = 6;
}

message ReplicationFollowerMessage {
  oneof message {
    ReplicationFollowerMessageHandshakeResponse handshake_response = 1;
    ReplicationFollowerMessageIndexUpdate index_update = 2;
  }
}

message ReplicationFollowerMessageHandshakeResponse {
  bool   success = 1;
  uint64 last_term = 2;
  uint64 last_term_first_tx_id = 3; // term first local committed tx id
  uint64 last_term_curr_tx_id = 4; // term last local committed tx id
  uint32 reject_reason = 5;
}

message ReplicationFollowerMessageIndexUpdate {
  uint64 local_commit_id = 4;
}

enum RejectReason {
  REJECT_NONE = 0;
  REJECT_TERM_STALE = 1;  // request.term < follower.current_term
  REJECT_PREV_MISMATCH = 2;  // prev_tx_id/prev_term not in follower's log
  REJECT_CRC_FAILED = 3;  // per-record CRC32C check failed
  REJECT_SEQUENCE_INVALID = 4;  // tx_id sequence non-monotonic or range mismatch
  REJECT_WAL_APPEND_FAILED = 5;  // local I/O error during append or fsync
  REJECT_NOT_FOLLOWER = 6;  // recipient is leader or recovering
}
