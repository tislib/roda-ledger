[server]
host = "0.0.0.0"
port = 50051
max_connections = 1000
max_message_size_bytes = 4194304  # 4 MiB

[cluster]
replication_poll_ms = 5
append_entries_max_bytes = 4194304  # 4 MiB

[cluster.node]
node_id = 1
host = "0.0.0.0"
port = 50061

# Symmetric peer list — every node ships the same three entries.
# Hostnames are the docker-compose service names.
[[cluster.peers]]
peer_id = 1
host = "http://roda-node1:50061"

[[cluster.peers]]
peer_id = 2
host = "http://roda-node2:50061"

[[cluster.peers]]
peer_id = 3
host = "http://roda-node3:50061"

[ledger]
max_accounts = 1000000
wait_strategy = "balanced"   # low_latency | balanced | low_cpu

[ledger.storage]
data_dir = "/app/data"
transaction_count_per_segment = 10000000  # 10M transactions per segment
snapshot_frequency = 2       # take a snapshot every N sealed WAL segments
