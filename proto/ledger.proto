syntax = "proto3";

package roda.ledger.v1;

// Ledger is the primary service for submitting and querying financial transactions.
// All monetary amounts are in integer minor units (e.g. cents, not dollars).
// No floating point is used anywhere in this API.
//
// All RPCs are unary. Batching is done by grouping multiple operations or IDs
// inside a single request message. The client controls batch size.
service Ledger {

  // SubmitOperation submits a single financial operation to the ledger.
  // Returns immediately with a transaction_id once the operation is sequenced.
  // Each operation is atomic and serialized in the global order.
  // The transaction_id is monotonically increasing and globally ordered.
  // Use GetTransactionStatus or GetTransactionStatuses to poll for finality.
  rpc SubmitOperation(SubmitOperationRequest) returns (SubmitOperationResponse);

  // SubmitAndWait blocks until the specified WaitLevel is reached.
  // Returns the full result including status and fail_reason.
  rpc SubmitAndWait(SubmitAndWaitRequest) returns (SubmitAndWaitResponse);

  // SubmitBatch submits multiple operations in a single round trip.
  // Operations are sequenced and executed in the order provided in the request,
  // however, there is no global order guarantee (meaning other transactions from
  // different clients may be interleaved between operations in this batch).
  // There is no atomic guarantee for the whole batch — each operation is
  // independent and atomic on its own. Failure of one does not affect others.
  // Results are returned in the same order as the input operations.
  // Prefer this over repeated SubmitOperation calls for high-throughput ingestion.
  rpc SubmitBatch(SubmitBatchRequest) returns (SubmitBatchResponse);

  // SubmitBatchAndWait blocks until all operations in the batch reach the specified WaitLevel.
  // Returns the full result including status and fail_reason per operation.
  rpc SubmitBatchAndWait(SubmitBatchAndWaitRequest) returns (SubmitBatchAndWaitResponse);

  // GetBalance returns the current balance for a single account.
  // Balance reflects all transactions that have reached ON_SNAPSHOT stage.
  // For accounts that have never received a transaction, returns 0.
  //
  // GetBalance is not linearizable by default — it reflects the Snapshotter stage,
  // which may lag behind committed transactions. To achieve a linearizable read
  // after a write, poll GetBalance until last_snapshot_tx_id >= your transaction_id.
  // Alternatively, use GetPipelineIndex to check snapshot_index before reading.
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);

  // GetBalances returns balances for multiple accounts in a single round trip.
  // Results are returned in the same order as the input account_ids.
  //
  // GetBalances is not linearizable by default — it reflects the Snapshotter stage,
  // which may lag behind committed transactions. To achieve a linearizable read
  // after a write, poll GetBalances until last_snapshot_tx_id >= your transaction_id.
  // Alternatively, use GetPipelineIndex to check snapshot_index before reading.
  rpc GetBalances(GetBalancesRequest) returns (GetBalancesResponse);

  // GetTransactionStatus returns the current pipeline stage of a single transaction.
  // See TransactionStatus for the meaning of each stage.
  rpc GetTransactionStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetTransactionStatuses returns the pipeline stage of multiple transactions
  // in a single round trip. Results are returned in the same order as the input IDs.
  // Use this to poll a batch of submitted transactions for finality instead of
  // calling GetTransactionStatus N times.
  rpc GetTransactionStatuses(GetStatusesRequest) returns (GetStatusesResponse);

  // GetPipelineIndex returns the current progress index of each pipeline stage.
  // Use this for health checks, lag monitoring, and determining when a bulk load
  // is complete without querying individual transactions.
  rpc GetPipelineIndex(GetPipelineIndexRequest) returns (GetPipelineIndexResponse);

  // GetTransaction retrieves the full details of a specific transaction by ID.
  // Queries the in-memory index first (hot tier); falls back to sealed segment
  // files on a cache miss (cold tier). Required for payment status checks,
  // reconciliation, and audit.
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse);

  // GetAccountHistory retrieves transactions involving a specific account,
  // newest first, with pagination. Queries the in-memory index first; falls
  // back to sealed segments on a cache miss. Required for account statements,
  // balance verification, and dispute resolution.
  rpc GetAccountHistory(GetAccountHistoryRequest) returns (GetAccountHistoryResponse);

  // ---- ADR-014: WASM Function Registry ----

  // RegisterFunction installs (or replaces, with override=true) a compiled
  // WASM module under a snake_case name. The binary must export an
  // `execute(i64 x 8) -> i32` entry point. Blocks until the Snapshot stage
  // has committed the record and the runtime reflects the new handler —
  // subsequent Named operations referencing `name` are guaranteed to see it.
  rpc RegisterFunction(RegisterFunctionRequest) returns (RegisterFunctionResponse);

  // UnregisterFunction removes the handler for `name`. Blocks until the
  // handler is gone from the runtime. Subsequent Named operations
  // referencing `name` return INVALID_OPERATION.
  rpc UnregisterFunction(UnregisterFunctionRequest) returns (UnregisterFunctionResponse);

  // ListFunctions returns metadata for every currently-loaded function.
  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsResponse);
}

// ---- Operation messages ----

// SubmitOperationRequest wraps one of the supported operation types.
// Exactly one operation field must be set. Setting zero or more than one is an error.
// Used by the fire-and-forget SubmitOperation RPC.
message SubmitOperationRequest {
  oneof operation {
    Deposit    deposit    = 1;
    Withdrawal withdrawal = 2;
    Transfer   transfer   = 3;
    Composite  composite  = 4;
    Named      named      = 5;
  }
}

// SubmitAndWaitRequest wraps an operation with a WaitLevel.
// Used by the blocking SubmitAndWait RPC.
message SubmitAndWaitRequest {
  oneof operation {
    Deposit    deposit    = 1;
    Withdrawal withdrawal = 2;
    Transfer   transfer   = 3;
    Composite  composite  = 4;
    Named      named      = 5;
  }
  WaitLevel wait_level = 6;
}

enum WaitLevel {
  WAIT_LEVEL_COMPUTED   = 0; // if omitted in request, used for async SubmitOperation
  WAIT_LEVEL_COMMITTED   = 1;
  WAIT_LEVEL_SNAPSHOT = 2;
}

// Deposit credits an account from the system source.
// The system source (SYSTEM_SOURCE) absorbs the corresponding debit to maintain
// the zero-sum invariant. Deposits never fail due to insufficient funds.
message Deposit {
  uint64 account  = 1; // Target account ID. Must be < max_accounts.
  uint64 amount   = 2; // Amount to deposit in minor units. Must be > 0.
  uint64 user_ref = 3; // Opaque external reference. Stored in WAL, not interpreted
                       // by the ledger. Use this to link to your own database record
                       // (e.g. an order ID, payment ID).
}

// Withdrawal debits an account to the system sink.
// The system sink (SYSTEM_SINK) absorbs the corresponding credit to maintain
// the zero-sum invariant. Fails with INSUFFICIENT_FUNDS if balance < amount.
message Withdrawal {
  uint64 account  = 1; // Source account ID. Must be < max_accounts.
  uint64 amount   = 2; // Amount to withdraw in minor units. Must be > 0.
  uint64 user_ref = 3; // Opaque external reference. See Deposit.user_ref.
}

// Transfer moves funds between two accounts atomically.
// No value enters or leaves the system — both credit and debit happen in the same transaction.
// Fails with INSUFFICIENT_FUNDS if from account balance < amount.
// If from == to, the operation is a no-op and succeeds immediately.
message Transfer {
  uint64 from     = 1; // Source account ID. Must be < max_accounts.
  uint64 to       = 2; // Destination account ID. Must be < max_accounts.
  uint64 amount   = 3; // Amount to transfer in minor units. Must be > 0.
  uint64 user_ref = 4; // Opaque external reference. See Deposit.user_ref.
}

// Composite is a user-defined multi-step atomic operation.
// All steps execute atomically — either all commit or none do.
// The zero-sum invariant is always enforced: sum(credits) must equal sum(debits).
// Additional checks are controlled via the flags field.
// Maximum 255 steps per operation.
message Composite {
  repeated Step steps = 1; // Ordered list of credit/debit steps.
  uint64 flags        = 2; // Bitset of CompositeOperationFlags. See flag definitions below.
  uint64 user_ref     = 3; // Opaque external reference. See Deposit.user_ref.
}

// Named invokes a registered WASM function (ADR-014).
// The function ABI is fixed-arity: exactly 8 `i64` positional parameters.
// Proto3 has no fixed-length array type, so `params` stays `repeated int64`
// on the wire; the server coerces to `[i64; 8]` by zero-padding short
// lists and dropping anything beyond the first 8 values.
message Named {
  string         name     = 1; // Operation name (snake_case, max 32 bytes).
  repeated int64 params   = 2; // 0..=8 positional parameters; short lists are zero-padded.
  uint64         user_ref = 3; // Opaque external reference. See Deposit.user_ref.
}

// CompositeOperationFlags is a bitset encoded as uint64.
// Each bit enables an additional validation check applied atomically with execution.
// Combine multiple flags with bitwise OR (e.g. flags = 0x1 | 0x2 = 3).
//
// Defined bits:
//
//   0x0000000000000001 (bit 0) — CHECK_NEGATIVE_BALANCE
//       Reject the entire operation if any account touched by the steps would go
//       negative after execution. Enforces that no account is overdrafted as a
//       result of this specific operation. Without this flag, negative balances
//       are permitted (useful for liability accounts or system accounts).
//       Rejection code: INSUFFICIENT_FUNDS.
//
//   0x0000000000000002–0x4000000000000000 (bits 1–62) — Reserved.
//       Reserved for future standard checks. Do not set these bits.
//
// Example — fee deduction with overdraft protection:
//   flags    = 1  (CHECK_NEGATIVE_BALANCE)
//   steps    = [Credit(sender, amount+fee), Debit(receiver, amount), Debit(fee_acct, fee)]
//   Outcome  = rejected if sender balance would go negative after the credit step.

// Step is a single credit or debit within a Composite operation.
message Step {
  oneof kind {
    CreditStep credit = 1; // Reduce account balance (funds leave this account).
    DebitStep  debit  = 2; // Increase account balance (funds arrive at this account).
  }
}

// CreditStep reduces the balance of an account.
// In double-entry terms: the account is on the credit side of the entry.
// Economically: funds flow out of this account.
message CreditStep {
  uint64 account_id = 1; // Account to credit. Must be < max_accounts.
  uint64 amount     = 2; // Amount in minor units. Must be > 0.
}

// DebitStep increases the balance of an account.
// In double-entry terms: the account is on the debit side of the entry.
// Economically: funds flow into this account.
message DebitStep {
  uint64 account_id = 1; // Account to debit. Must be < max_accounts.
  uint64 amount     = 2; // Amount in minor units. Must be > 0.
}

// ---- Submit responses ----

// SubmitOperationResponse is returned after an operation is sequenced.
// The transaction_id is assigned by the Sequencer and is available immediately —
// before the operation has been executed, persisted, or snapshotted.
// Used by the fire-and-forget SubmitOperation RPC.
message SubmitOperationResponse {
  uint64 transaction_id = 1; // Monotonically increasing, globally ordered transaction ID.
}

// SubmitAndWaitResponse is returned after the operation reaches the requested WaitLevel.
// Contains the full result including status and fail_reason.
message SubmitAndWaitResponse {
  uint64   transaction_id = 1; // Monotonically increasing, globally ordered transaction ID.
  uint32   fail_reason    = 2; // 0 if status == COMMITTED. See FailReason codes.
}

// SubmitBatchRequest submits multiple operations in a single round trip.
// Used by the fire-and-forget SubmitBatch RPC.
message SubmitBatchRequest {
  repeated SubmitOperationRequest operations = 1; // Operations to submit, in order.
                                                  // Each is independent — failure of one
                                                  // does not affect others.
}

// SubmitBatchResponse returns one result per input operation, same order.
message SubmitBatchResponse {
  repeated SubmitOperationResponse results = 1; // One result per input operation, same order.
}

// SubmitBatchAndWaitRequest submits multiple operations and blocks until all reach WaitLevel.
message SubmitBatchAndWaitRequest {
  repeated SubmitAndWaitRequest operations = 1; // Operations to submit, in order.
  WaitLevel                     wait_level = 2; // Pipeline stage to wait for.
}

// SubmitBatchAndWaitResponse returns the full result per operation after WaitLevel is reached.
message SubmitBatchAndWaitResponse {
  repeated SubmitAndWaitResponse results = 1; // One result per input operation, same order.
}

// ---- Balance messages ----

message GetBalanceRequest {
  uint64 account_id = 1; // Account to query. Returns 0 if never touched.
}

message GetBalanceResponse {
  int64 balance = 1; // Current balance in minor units. May be negative for liability
                     // or system accounts. Reflects only transactions that have reached
                     // ON_SNAPSHOT — see TransactionStatus for stage definitions.
  uint64 last_snapshot_tx_id = 2; // Indicates that all transactions up to and including
                                  // this ID are reflected in the balance. The actual
                                  // last snapshot ID might be slightly higher.
}

message GetBalancesRequest {
  repeated uint64 account_ids = 1; // Accounts to query. Duplicates allowed.
}

message GetBalancesResponse {
  repeated int64 balances = 1; // One balance per input account_id, in the same order.
                               // Returns 0 for accounts that have never been touched.
  uint64 last_snapshot_tx_id = 2; // Indicates that all transactions up to and including
                                  // this ID are reflected in the balances.
}

// ---- Status messages ----

message GetStatusRequest {
  uint64 transaction_id = 1;
}

// GetStatusResponse returns the pipeline stage and rejection reason for a transaction.
message GetStatusResponse {
  TransactionStatus status      = 1; // Current pipeline stage. See TransactionStatus.
  uint32            fail_reason = 2; // Rejection code. 0 = success. Only meaningful when
                                     // status == ERROR.
                                     // Standard codes:
                                     //   1 = INSUFFICIENT_FUNDS
                                     //   2 = ACCOUNT_NOT_FOUND
                                     //   3 = ZERO_SUM_VIOLATION
                                     //   4 = ENTRY_LIMIT_EXCEEDED
                                     //   5 = INVALID_OPERATION
                                     //   6 = ACCOUNT_LIMIT_EXCEEDED
                                     // Codes 128–255 are user-defined.
}

message GetStatusesRequest {
  repeated uint64 transaction_ids = 1; // Transaction IDs to query.
}

message GetStatusesResponse {
  repeated GetStatusResponse results = 1; // One result per input transaction_id, same order.
}

// TransactionStatus represents the pipeline stage a transaction has reached.
// Stages are strictly ordered: PENDING → COMPUTED → COMMITTED → ON_SNAPSHOT.
// ERROR is a terminal state reachable only from PENDING (rejected before or during execution).
enum TransactionStatus {
  // PENDING: Sequenced but not yet processed by the Transactor.
  // The transaction has a transaction_id but business logic has not run.
  // Balance has not changed. Not durable.
  PENDING = 0;

  // COMPUTED: The Transactor has executed the business logic.
  // Balance changes are live in the Transactor's in-memory state.
  // NOT yet written to WAL — a crash at this point would lose this transaction.
  // GetBalance does not yet reflect this transaction.
  COMPUTED = 1;

  // COMMITTED: The WAL Storer has flushed the transaction to disk.
  // The transaction is durable — it will survive a crash and be replayed on restart.
  // GetBalance does not yet reflect this transaction (that requires ON_SNAPSHOT).
  COMMITTED = 2;

  // ON_SNAPSHOT: The Snapshotter has applied the transaction's entries to the balance cache.
  // GetBalance now reflects this transaction. This is the final successful state —
  // durable and queryable.
  ON_SNAPSHOT = 3;

  // ERROR: The transaction was rejected. Business logic ran but a constraint was
  // violated (e.g. insufficient funds, zero-sum violation). A WAL record was written
  // for audit purposes. No balance changes occurred. Check fail_reason for the cause.
  ERROR = 4;
}

// ---- Pipeline index ----

// GetPipelineIndexRequest has no parameters.
message GetPipelineIndexRequest {}

// GetPipelineIndexResponse returns the highest transaction_id fully processed
// by each pipeline stage. Maps directly to Ledger::last_compute_id(),
// last_commit_id(), and last_snapshot_id() in library mode.
//
// Common use cases:
//   Health check:          all three indexes should be advancing
//   Commit lag:            computed_index - committed_index
//   Snapshot lag:          committed_index - snapshot_index
//   Bulk load completion:  poll until snapshot_index >= last submitted transaction_id
message GetPipelineIndexResponse {
  // computed_index: highest transaction_id processed by the Transactor.
  // Business logic has run. Balance changes are in memory but not yet durable.
  // Maps to Ledger::last_compute_id().
  uint64 compute_index = 1;

  // committed_index: highest transaction_id flushed to WAL.
  // All transactions at or below this index are durable and crash-safe.
  // Maps to Ledger::last_commit_id().
  uint64 commit_index = 2;

  // snapshot_index: highest transaction_id applied to the balance cache.
  // GetBalance reflects all transactions at or below this index.
  // Maps to Ledger::last_snapshot_id().
  uint64 snapshot_index = 3;
}

// ---- Transaction query (ADR-008) ----

message GetTransactionRequest {
  uint64 tx_id = 1;
}

message GetTransactionResponse {
  uint64               tx_id       = 1;
  repeated TxEntryRecord entries   = 2;
  repeated TxLinkRecord  links     = 3;
}

// TxEntryRecord represents a single debit or credit within a transaction.
message TxEntryRecord {
  uint64    account_id       = 1;
  uint64    amount           = 2;
  EntryKind kind             = 3;
  int64     computed_balance = 4;
}

enum EntryKind {
  CREDIT = 0;
  DEBIT  = 1;
}

// TxLinkRecord represents a link between transactions (ADR-009).
message TxLinkRecord {
  uint64   to_tx_id = 1;  // Referenced transaction ID.
  LinkKind kind     = 2;  // Type of link relationship.
}

enum LinkKind {
  DUPLICATE = 0;  // This transaction is a duplicate of to_tx_id.
  REVERSAL  = 1;  // This transaction reverses to_tx_id.
}

// ---- Account history query (ADR-008) ----

message GetAccountHistoryRequest {
  uint64 account_id = 1;
  uint64 from_tx_id = 2;  // 0 = latest
  uint32 limit      = 3;  // default 20, max 1000
}

message GetAccountHistoryResponse {
  repeated TxEntryRecord entries    = 1;
  uint64                 next_tx_id = 2;  // 0 = no more entries
}

// ---- ADR-014: Function Registry ----

message RegisterFunctionRequest {
  string name              = 1;   // snake_case, max 32 bytes
  bytes  binary            = 2;   // WASM binary; must export execute(i64 x 8) -> i32
  bool   override_existing = 3;   // if false and name already registered, server returns ALREADY_EXISTS
}

message RegisterFunctionResponse {
  uint32 version = 1;  // monotonic per-name, starts at 1
  uint32 crc32c  = 2;  // CRC32C of the binary
}

message UnregisterFunctionRequest {
  string name = 1;
}

message UnregisterFunctionResponse {
  uint32 version = 1;  // version stamped on the unregister record
}

message ListFunctionsRequest {}

message ListFunctionsResponse {
  repeated FunctionInfo functions = 1;
}

message FunctionInfo {
  string name    = 1;
  uint32 version = 2;
  uint32 crc32c  = 3;
}
