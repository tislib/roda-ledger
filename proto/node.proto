syntax = "proto3";

// Peer-to-peer replication service (separate port from client API).
package roda.node.v1;

service Node {
  // Ship WAL blocks from leader to follower; returns on durable commit.
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);

  // Peer health check.
  rpc Ping(PingRequest) returns (PingResponse);

  // Leader election — UNIMPLEMENTED until ADR-016.
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);

  // Snapshot catch-up — UNIMPLEMENTED until ADR-016.
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

// ---- AppendEntries ----

message AppendEntriesRequest {
  uint64 leader_id         = 1;
  uint64 term              = 2;
  uint64 prev_block_index  = 3;
  uint64 prev_block_term   = 4;
  // Raw WAL bytes per block: `BlockHeader (40B) + len × 40B records`.
  repeated bytes blocks    = 5;
  uint64 leader_commit_index = 6;
}

message AppendEntriesResponse {
  uint64 term             = 1;
  bool   success          = 2;
  uint64 last_block_index = 3; // follower's tail; backtrack hint on reject
  uint32 reject_reason    = 4; // See RejectReason.
}

enum RejectReason {
  REJECT_NONE                = 0;
  REJECT_TERM_STALE          = 1;
  REJECT_PREV_MISMATCH       = 2;
  REJECT_BLOCK_HEADER_INVALID = 3;
  REJECT_CRC_FAILED          = 4;
  REJECT_SEQUENCE_INVALID    = 5;
  REJECT_WAL_APPEND_FAILED   = 6;
  REJECT_NOT_FOLLOWER        = 7;
}

// ---- Ping ----

message PingRequest {
  uint64 from_node_id = 1;
}

message PingResponse {
  uint64 node_id          = 1;
  uint64 term             = 2;
  uint64 last_block_index = 3;
  NodeRole role           = 4;
}

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_LEADER      = 1;
  NODE_ROLE_FOLLOWER    = 2;
}

// ---- RequestVote (placeholder, UNIMPLEMENTED until ADR-016) ----

message RequestVoteRequest {
  uint64 term             = 1;
  uint64 candidate_id     = 2;
  uint64 last_block_index = 3;
  uint64 last_block_term  = 4;
}

message RequestVoteResponse {
  uint64 term         = 1;
  bool   vote_granted = 2;
}

// ---- InstallSnapshot (placeholder, UNIMPLEMENTED until ADR-016) ----

message InstallSnapshotRequest {
  uint64 term                 = 1;
  uint64 leader_id            = 2;
  uint64 last_included_index  = 3;
  uint64 last_included_term   = 4;
  uint64 offset               = 5;
  bytes  data                 = 6;
  bool   done                 = 7;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}
